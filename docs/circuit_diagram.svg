<svg viewBox="0 0 960 680" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <filter id="sh"><feDropShadow dx="2" dy="3" stdDeviation="4" flood-opacity="0.4"/></filter>
    <filter id="sh2"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.3"/></filter>
    <linearGradient id="pcbGreen" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1a4a2a"/><stop offset="100%" stop-color="#0d3018"/></linearGradient>
    <linearGradient id="meterGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#2a2a5a"/><stop offset="100%" stop-color="#1a1a3a"/></linearGradient>
    <linearGradient id="dcuGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#3a1a1a"/><stop offset="100%" stop-color="#1f0d0d"/></linearGradient>
    <linearGradient id="radioGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1a3a5a"/><stop offset="100%" stop-color="#0d2035"/></linearGradient>
    <linearGradient id="relayGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#3a2a1a"/><stop offset="100%" stop-color="#1f1509"/></linearGradient>
  </defs>

  <rect width="960" height="680" fill="#f0f0f0"/>
  <rect x="0" y="0" width="960" height="36" fill="#1e293b"/>
  <text x="480" y="14" text-anchor="middle" fill="white" font-size="11" font-weight="bold">SmartMeter Load Parameter &amp; Load Control via DCU — Circuit Diagram</text>
  <text x="480" y="28" text-anchor="middle" fill="#94a3b8" font-size="8.5">DLMS/COSEM · MQTT · phyWAVE FG23 · RB-iMX6ULL · Yaswanth Chlliboina</text>

  <!-- ══ SMART METER UNIT (center-left) ══ -->
  <g filter="url(#sh)">
    <rect x="60" y="120" width="240" height="350" rx="10" fill="url(#meterGrad)"/>
    <rect x="66" y="126" width="228" height="338" rx="8" fill="none" stroke="#4a4aaf" stroke-width="2"/>
    <!-- Meter display -->
    <rect x="80" y="140" width="200" height="70" rx="5" fill="#111"/>
    <rect x="86" y="146" width="188" height="58" rx="3" fill="#0a1f0a"/>
    <text x="180" y="163" text-anchor="middle" fill="#00ff41" font-size="8" font-family="'Courier New', monospace">SMART METER</text>
    <text x="180" y="177" text-anchor="middle" fill="#00ff41" font-size="11" font-family="'Courier New', monospace" font-weight="bold">230.4 V</text>
    <text x="180" y="192" text-anchor="middle" fill="#00aa41" font-size="9" font-family="'Courier New', monospace">15.2 A  |  3.49 kW</text>
    <!-- Meter body details -->
    <rect x="80" y="225" width="95" height="80" rx="4" fill="#111" stroke="#333" stroke-width="1.5"/>
    <text x="127" y="255" text-anchor="middle" fill="#666" font-size="7">DLMS/COSEM</text>
    <text x="127" y="267" text-anchor="middle" fill="#666" font-size="7">Protocol Stack</text>
    <text x="127" y="279" text-anchor="middle" fill="#555" font-size="6">IEC 62056</text>
    <text x="127" y="293" text-anchor="middle" fill="#555" font-size="6">Embedded C</text>
    <!-- Relay block -->
    <rect x="185" y="225" width="90" height="80" rx="4" fill="#2a1a0a" stroke="#8b4513" stroke-width="1.5"/>
    <text x="230" y="252" text-anchor="middle" fill="#cd853f" font-size="7">INTERNAL</text>
    <text x="230" y="264" text-anchor="middle" fill="#cd853f" font-size="7">RELAY</text>
    <!-- Relay coil symbol -->
    <rect x="200" y="272" width="60" height="20" rx="3" fill="#1a0d00" stroke="#cd853f" stroke-width="1"/>
    <text x="230" y="286" text-anchor="middle" fill="#cd853f" font-size="8">ON/OFF</text>
    <!-- Load terminals -->
    <rect x="80" y="320" width="200" height="50" rx="4" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
    <text x="180" y="340" text-anchor="middle" fill="#aaa" font-size="7.5">LOAD TERMINALS</text>
    <circle cx="120" cy="357" r="9" fill="#444" stroke="#888" stroke-width="2"/>
    <circle cx="160" cy="357" r="9" fill="#444" stroke="#888" stroke-width="2"/>
    <circle cx="200" cy="357" r="9" fill="#444" stroke="#888" stroke-width="2"/>
    <circle cx="240" cy="357" r="9" fill="#444" stroke="#888" stroke-width="2"/>
    <text x="120" y="360" text-anchor="middle" fill="#ccc" font-size="7">L</text>
    <text x="160" y="360" text-anchor="middle" fill="#ccc" font-size="7">N</text>
    <text x="200" y="360" text-anchor="middle" fill="#ccc" font-size="7">L'</text>
    <text x="240" y="360" text-anchor="middle" fill="#ccc" font-size="7">N'</text>
    <!-- phyWAVE radio module -->
    <rect x="80" y="385" width="200" height="65" rx="4" fill="url(#radioGrad)" stroke="#3a6a8a" stroke-width="1.5"/>
    <rect x="86" y="391" width="188" height="53" rx="3" fill="none" stroke="#4a7aaa" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="92" y="398" width="80" height="38" rx="3" fill="#0d1a24" stroke="#2a4a6a" stroke-width="1"/>
    <text x="132" y="413" text-anchor="middle" fill="#93c5fd" font-size="7">phyWAVE</text>
    <text x="132" y="424" text-anchor="middle" fill="#93c5fd" font-size="7">FG23</text>
    <text x="132" y="435" text-anchor="middle" fill="#5a8aaf" font-size="6">Sub-GHz RF</text>
    <!-- Antenna -->
    <line x1="172" y1="398" x2="172" y2="370" stroke="#93c5fd" stroke-width="2"/>
    <line x1="162" y1="378" x2="182" y2="370" stroke="#93c5fd" stroke-width="1.5"/>
    <line x1="162" y1="386" x2="182" y2="378" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="182" y="372" fill="#93c5fd" font-size="7">ANT</text>
    <!-- Gurux label -->
    <rect x="185" y="400" width="85" height="30" rx="3" fill="#0d1a2e" stroke="#2a4a6a" stroke-width="1"/>
    <text x="227" y="415" text-anchor="middle" fill="#60a5fa" font-size="7">Gurux</text>
    <text x="227" y="426" text-anchor="middle" fill="#3b82f6" font-size="6.5">DLMS Director</text>
    <!-- Meter pins at bottom -->
    <g fill="#c0a000">
      <rect x="90" y="461" width="7" height="14" rx="1"/><rect x="105" y="461" width="7" height="14" rx="1"/>
      <rect x="120" y="461" width="7" height="14" rx="1"/><rect x="135" y="461" width="7" height="14" rx="1"/>
    </g>
    <text x="93" y="484" fill="#fbbf24" font-size="5.5" text-anchor="middle">VCC</text>
    <text x="108" y="484" fill="#fbbf24" font-size="5.5" text-anchor="middle">GND</text>
    <text x="123" y="484" fill="#fbbf24" font-size="5.5" text-anchor="middle">TX</text>
    <text x="138" y="484" fill="#fbbf24" font-size="5.5" text-anchor="middle">RX</text>
  </g>
  <text x="180" y="113" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="bold">Smart Meter (DLMS/COSEM)</text>

  <!-- ══ DCU — RB-iMX6ULL (center-right) ══ -->
  <g filter="url(#sh)">
    <rect x="650" y="120" width="260" height="350" rx="10" fill="url(#dcuGrad)"/>
    <rect x="656" y="126" width="248" height="338" rx="8" fill="none" stroke="#8a2a2a" stroke-width="2"/>
    <!-- DCU display/label -->
    <rect x="665" y="140" width="225" height="65" rx="5" fill="#111"/>
    <rect x="672" y="148" width="211" height="49" rx="3" fill="#1a0500"/>
    <text x="777" y="164" text-anchor="middle" fill="#ff6b2b" font-size="8" font-family="'Courier New', monospace">DATA CONCENTRATOR UNIT</text>
    <text x="777" y="178" text-anchor="middle" fill="#ff8c42" font-size="9" font-family="'Courier New', monospace" font-weight="bold">RB-iMX6ULL</text>
    <text x="777" y="191" text-anchor="middle" fill="#cc5500" font-size="7" font-family="'Courier New', monospace">Linux · MQTT Broker</text>
    <!-- i.MX6ULL SoC -->
    <rect x="665" y="220" width="105" height="90" rx="4" fill="#111" stroke="#333" stroke-width="1.5"/>
    <text x="717" y="248" text-anchor="middle" fill="#888" font-size="8">i.MX6ULL</text>
    <text x="717" y="261" text-anchor="middle" fill="#666" font-size="7">ARM Cortex-A7</text>
    <text x="717" y="274" text-anchor="middle" fill="#666" font-size="7">528 MHz Linux</text>
    <text x="717" y="287" text-anchor="middle" fill="#555" font-size="6">MQTT Broker</text>
    <text x="717" y="298" text-anchor="middle" fill="#555" font-size="6">Node-RED</text>
    <!-- RF receiver block -->
    <rect x="785" y="220" width="110" height="90" rx="4" fill="url(#radioGrad)" stroke="#3a6a8a" stroke-width="1.5"/>
    <rect x="792" y="227" width="96" height="76" rx="3" fill="none" stroke="#4a7aaa" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="797" y="234" width="75" height="48" rx="3" fill="#0d1a24" stroke="#2a4a6a" stroke-width="1"/>
    <text x="834" y="252" text-anchor="middle" fill="#93c5fd" font-size="7">phyWAVE</text>
    <text x="834" y="264" text-anchor="middle" fill="#93c5fd" font-size="7">FG23</text>
    <text x="834" y="276" text-anchor="middle" fill="#5a8aaf" font-size="6">DCU Radio</text>
    <!-- Antenna -->
    <line x1="875" y1="234" x2="875" y2="200" stroke="#93c5fd" stroke-width="2"/>
    <line x1="863" y1="210" x2="887" y2="200" stroke="#93c5fd" stroke-width="1.5"/>
    <line x1="863" y1="218" x2="887" y2="210" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="888" y="204" fill="#93c5fd" font-size="7">ANT</text>
    <!-- Ethernet port -->
    <rect x="665" y="325" width="70" height="45" rx="4" fill="#222" stroke="#555" stroke-width="1.5"/>
    <text x="700" y="343" text-anchor="middle" fill="#aaa" font-size="7">ETH</text>
    <g fill="#444">
      <rect x="672" y="348" width="10" height="8" rx="1"/><rect x="686" y="348" width="10" height="8" rx="1"/>
      <rect x="700" y="348" width="10" height="8" rx="1"/>
    </g>
    <!-- USB port -->
    <rect x="748" y="325" width="55" height="45" rx="4" fill="#222" stroke="#555" stroke-width="1.5"/>
    <text x="775" y="343" text-anchor="middle" fill="#aaa" font-size="7">USB</text>
    <rect x="757" y="350" width="36" height="12" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
    <!-- SD card slot -->
    <rect x="815" y="325" width="75" height="45" rx="4" fill="#333" stroke="#555" stroke-width="1.5"/>
    <text x="852" y="343" text-anchor="middle" fill="#aaa" font-size="7">SD Card</text>
    <rect x="820" y="350" width="65" height="12" rx="1" fill="#555"/>
    <!-- DCU header pins -->
    <g fill="#c0a000">
      <rect x="668" y="385" width="7" height="14" rx="1"/><rect x="683" y="385" width="7" height="14" rx="1"/>
      <rect x="698" y="385" width="7" height="14" rx="1"/><rect x="713" y="385" width="7" height="14" rx="1"/>
      <rect x="728" y="385" width="7" height="14" rx="1"/>
    </g>
    <text x="671" y="407" fill="#fbbf24" font-size="5.5" text-anchor="middle">5V</text>
    <text x="686" y="407" fill="#fbbf24" font-size="5.5" text-anchor="middle">GND</text>
    <text x="701" y="407" fill="#fbbf24" font-size="5.5" text-anchor="middle">TX</text>
    <text x="716" y="407" fill="#fbbf24" font-size="5.5" text-anchor="middle">RX</text>
    <text x="731" y="407" fill="#fbbf24" font-size="5.5" text-anchor="middle">ETH</text>
    <!-- MQTT labels -->
    <rect x="665" y="415" width="225" height="50" rx="4" fill="#1a0800" stroke="#8a4000" stroke-width="1"/>
    <text x="777" y="432" text-anchor="middle" fill="#fb923c" font-size="7.5" font-weight="bold">MQTT Topics</text>
    <text x="700" y="447" fill="#f97316" font-size="6.5" font-family="'Courier New', monospace">meter/load/control</text>
    <text x="700" y="458" fill="#f97316" font-size="6.5" font-family="'Courier New', monospace">meter/params/data</text>
  </g>
  <text x="780" y="113" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="bold">DCU — RB-iMX6ULL (Linux)</text>

  <!-- ══ PC / HES (bottom-center) ══ -->
  <g filter="url(#sh2)">
    <rect x="355" y="480" width="230" height="130" rx="8" fill="#1e293b"/>
    <rect x="361" y="486" width="218" height="118" rx="6" fill="none" stroke="#334155" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="370" y="495" width="200" height="80" rx="4" fill="#0f172a"/>
    <rect x="376" y="501" width="188" height="68" rx="3" fill="#020617"/>
    <text x="470" y="515" text-anchor="middle" fill="#22d3ee" font-size="7" font-family="'Courier New', monospace">Gurux DLMS Director</text>
    <text x="420" y="528" fill="#4ade80" font-size="6.5" font-family="'Courier New', monospace">V: 230.4  A: 15.2</text>
    <text x="420" y="540" fill="#4ade80" font-size="6.5" font-family="'Courier New', monospace">kWh: 1234.5  PF: 0.97</text>
    <text x="420" y="552" fill="#f59e0b" font-size="6.5" font-family="'Courier New', monospace">Status: CONNECTED</text>
    <text x="420" y="564" fill="#a855f7" font-size="6.5" font-family="'Courier New', monospace">MQTT: 5 meters online</text>
    <!-- Keyboard hint -->
    <rect x="390" y="580" width="160" height="20" rx="3" fill="#334155"/>
    <text x="470" y="594" text-anchor="middle" fill="#64748b" font-size="7">PC / Head-End Server (HES)</text>
  </g>
  <text x="470" y="475" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="bold">Monitoring PC / HES</text>

  <!-- ══ RF WIRELESS LINK (center) ══ -->
  <g opacity="0.8">
    <!-- RF waves between meter and DCU -->
    <path d="M310,415 Q365,395 420,415" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="6,3"/>
    <path d="M310,405 Q365,380 420,405" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="6,3"/>
    <path d="M310,425 Q365,410 420,425" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="365" y="378" text-anchor="middle" fill="#93c5fd" font-size="8.5" font-weight="bold">Sub-GHz RF</text>
    <text x="365" y="390" text-anchor="middle" fill="#60a5fa" font-size="7.5">phyWAVE FG23</text>
    <text x="365" y="401" text-anchor="middle" fill="#60a5fa" font-size="7">DLMS/COSEM frames</text>
    <!-- RF arrows -->
    <polygon points="310,415 320,410 320,420" fill="#93c5fd"/>
    <polygon points="420,415 430,415 425,420" fill="#93c5fd"/>
  </g>

  <!-- ══ MQTT NETWORK LINK ══ -->
  <!-- DCU to PC via Ethernet/Internet -->
  <polyline points="700,420 700,450 470,450 470,480" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="585" y="445" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="bold">MQTT over TCP/IP</text>
  <!-- Arrow -->
  <polygon points="470,480 465,470 475,470" fill="#f59e0b"/>

  <!-- ══ RELAY CONTROL WIRE ══ -->
  <rect x="332" y="220" width="185" height="65" rx="6" fill="#1a0d00" stroke="#92400e" stroke-width="1.5"/>
  <text x="424" y="240" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="bold">Load Control Flow</text>
  <text x="344" y="256" fill="#fbbf24" font-size="7">1. DCU sends DISCONNECT cmd</text>
  <text x="344" y="268" fill="#fbbf24" font-size="7">2. Meter parses DLMS/COSEM</text>
  <text x="344" y="280" fill="#fbbf24" font-size="7">3. Relay opens → load OFF</text>

  <!-- ══ POWER SUPPLY ══ -->
  <rect x="332" y="310" width="185" height="55" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="424" y="328" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="bold">Power</text>
  <text x="344" y="343" fill="#64748b" font-size="7">Meter: 230V AC mains input</text>
  <text x="344" y="355" fill="#64748b" font-size="7">DCU: 5V DC adapter</text>

  <!-- ══ PROTOCOL STACK ══ -->
  <rect x="332" y="385" width="185" height="75" rx="6" fill="#0f1f0f" stroke="#166534" stroke-width="1.5"/>
  <text x="424" y="402" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="bold">Protocol Stack</text>
  <text x="344" y="416" fill="#86efac" font-size="7">Application: DLMS/COSEM (IEC 62056)</text>
  <text x="344" y="428" fill="#86efac" font-size="7">Transport: MQTT (TCP/IP)</text>
  <text x="344" y="440" fill="#86efac" font-size="7">RF Layer: phyWAVE FG23 Sub-GHz</text>
  <text x="344" y="452" fill="#4ade80" font-size="7">Tool: Gurux DLMS Director</text>

  <!-- ══ LEGEND ══ -->
  <rect x="55" y="510" width="265" height="130" rx="6" fill="white" fill-opacity="0.85" stroke="#ddd" stroke-width="1"/>
  <text x="187" y="527" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="bold">Connection Legend</text>
  <g font-size="7.5" fill="#374151">
    <line x1="70" y1="540" x2="100" y2="540" stroke="#93c5fd" stroke-width="2.5" stroke-dasharray="6,3"/><text x="105" y="544">Sub-GHz RF (phyWAVE FG23)</text>
    <line x1="70" y1="555" x2="100" y2="555" stroke="#f59e0b" stroke-width="2.5"/><text x="105" y="559">MQTT TCP/IP (Ethernet)</text>
    <line x1="70" y1="570" x2="100" y2="570" stroke="#ef4444" stroke-width="2.5"/><text x="105" y="574">230V AC Power (Mains)</text>
    <line x1="70" y1="585" x2="100" y2="585" stroke="#22c55e" stroke-width="2.5"/><text x="105" y="589">DLMS/COSEM Commands</text>
    <text x="70" y="610" fill="#64748b" font-size="7">Meter ↔ DCU: phyWAVE FG23 wireless</text>
    <text x="70" y="622" fill="#64748b" font-size="7">DCU ↔ PC: MQTT over Ethernet/LAN</text>
    <text x="70" y="634" fill="#64748b" font-size="7">Relay: Controlled by DLMS disconnect cmd</text>
  </g>
</svg>
